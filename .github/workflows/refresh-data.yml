name: Refresh Property Data

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm install -D playwright@1.49.0 @playwright/test@1.49.0
          ./node_modules/.bin/playwright install chromium chromium-headless-shell --with-deps

      - name: Run discovery script
        continue-on-error: true
        env:
          KIE_AI_API_KEY: ${{ secrets.KIE_AI_API_KEY }}
          KIE_AI_DEFAULT_MODEL: ${{ secrets.KIE_AI_DEFAULT_MODEL }}
          REALT_API_KEY: ${{ secrets.REALT_API_KEY }}
        run: node scripts/discover-properties.mjs

      - name: Refresh property prices and yields
        run: node scripts/refresh-data.mjs

      - name: Generate SEO content
        continue-on-error: true
        env:
          KIE_AI_API_KEY: ${{ secrets.KIE_AI_API_KEY }}
          KIE_AI_DEFAULT_MODEL: ${{ secrets.KIE_AI_DEFAULT_MODEL }}
        run: node scripts/generate-seo-content.mjs

      - name: Commit updated data
        run: |
          git config user.name "brickwise-bot"
          git config user.email "bot@brickwise.pro"
          git add lib/data/properties-live.json lib/data/properties-auto.json lib/data/market-updates.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: refresh property market data [$(date -u +%Y-%m-%d)]"
            git push
          fi
