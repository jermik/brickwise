name: Refresh Property Data

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm install -D playwright
          npx playwright install chromium --with-deps

      - name: Run refresh script
        run: node scripts/refresh-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "brickwise-bot"
          git config user.email "bot@brickwise.pro"
          git add lib/data/properties-live.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: refresh property market data [$(date -u +%Y-%m-%d)]"
            git push
          fi
