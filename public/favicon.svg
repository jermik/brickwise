<!-- Brickwise favicon — 3x3 stair grid scaled to 32 viewBox.
     Cells at 8x8 with 1px gap. Blue accent in top-left is the unique
     anchor for 16px tab rendering. -->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E16"/>
      <stop offset="100%" stop-color="#05050B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Bottom row -->
  <rect x="3"  y="21" width="8" height="8" rx="1.6" fill="#FFFFFF"/>
  <rect x="12" y="21" width="8" height="8" rx="1.6" fill="#FFFFFF"/>
  <rect x="21" y="21" width="8" height="8" rx="1.6" fill="#FFFFFF"/>

  <!-- Middle row -->
  <rect x="3"  y="12" width="8" height="8" rx="1.6" fill="#FFFFFF"/>
  <rect x="12" y="12" width="8" height="8" rx="1.6" fill="#FFFFFF"/>

  <!-- Top accent -->
  <rect x="3" y="3" width="8" height="8" rx="1.6" fill="url(#accent)"/>
</svg>
