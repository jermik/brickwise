<!-- Brickwise mark — monochrome variant
     Pure two-tone for App Store / Play Store / print / monochrome contexts.
     Accent cell uses 60% opacity to create hierarchy without color. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0A0A12"/>

  <rect x="42"  y="258" width="100" height="100" rx="20" fill="#FFFFFF"/>
  <rect x="150" y="258" width="100" height="100" rx="20" fill="#FFFFFF"/>
  <rect x="258" y="258" width="100" height="100" rx="20" fill="#FFFFFF"/>

  <rect x="42"  y="150" width="100" height="100" rx="20" fill="#FFFFFF"/>
  <rect x="150" y="150" width="100" height="100" rx="20" fill="#FFFFFF"/>

  <rect x="42" y="42" width="100" height="100" rx="20" fill="#FFFFFF" opacity="0.55"/>
</svg>
