<!-- Brickwise mark — light variant
     For use on cream / white / light dashboard surfaces.
     Same geometry, inverted contrast, same blue accent. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="cellL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1B22"/>
      <stop offset="100%" stop-color="#0A0A12"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="#FAFAF9"/>

  <rect x="42"  y="258" width="100" height="100" rx="20" fill="url(#cellL)"/>
  <rect x="150" y="258" width="100" height="100" rx="20" fill="url(#cellL)"/>
  <rect x="258" y="258" width="100" height="100" rx="20" fill="url(#cellL)"/>

  <rect x="42"  y="150" width="100" height="100" rx="20" fill="url(#cellL)"/>
  <rect x="150" y="150" width="100" height="100" rx="20" fill="url(#cellL)"/>

  <rect x="42" y="42" width="100" height="100" rx="20" fill="url(#accentL)"/>
  <rect x="42" y="42" width="100" height="40" rx="20" fill="#FFFFFF" opacity="0.18"/>
</svg>
