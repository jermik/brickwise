<!-- Concept D — Interlocking Blocks
     Vibe: Notion / Arc / OpenAI. Two overlapping rounded forms creating an
     abstract "B" silhouette. Gradient + solid layered for depth. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A12"/>
      <stop offset="100%" stop-color="#04040A"/>
    </linearGradient>
    <linearGradient id="frontD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgD)"/>

  <!-- Back block: white/cream rounded square -->
  <rect x="82" y="82" width="172" height="172" rx="34" fill="#F5F5F7"/>

  <!-- Front block: electric blue gradient, offset to bottom-right, creates
       depth and the abstract "B" silhouette through overlap -->
  <rect x="146" y="146" width="172" height="172" rx="34" fill="url(#frontD)"/>

  <!-- Subtle inner highlight on the front block for premium dimensionality -->
  <rect x="146" y="146" width="172" height="34" rx="34" fill="#FFFFFF" opacity="0.12"/>
</svg>
