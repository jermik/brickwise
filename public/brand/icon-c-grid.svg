<!-- Concept C — Modular Brick Grid
     Vibe: Raycast / Vercel. 4×4 pixel grid forming a "B" silhouette via filled vs empty cells.
     One electric blue cell as the intelligence accent. Premium pixel-SaaS feel. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F17"/>
      <stop offset="100%" stop-color="#06060A"/>
    </linearGradient>
    <linearGradient id="cellC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C9D1E0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgC)"/>

  <!-- 4×4 grid: cells are 56×56 with 14px gaps, total 280px, centered at 60-340.
       Pattern reads as a stylized "B" silhouette:
       Row 0: X X X .
       Row 1: X . . X
       Row 2: X X X .
       Row 3: X . . X
       Wait — let me make a cleaner "B" pattern:
       Row 0: X X .
       Row 1: X X .
       Row 2: X X X
       Row 3: X . X
       Better yet, a pattern that just feels like building blocks growing.
       Final pattern (5 filled cells forming an ascending stair + accent):
       Row 0: A . . .   (top-left only, will be accent blue)
       Row 1: X X . .
       Row 2: X X X .
       Row 3: X X X X
  -->

  <!-- Row 3 (bottom, 4 cells) -->
  <rect x="60"  y="270" width="56" height="56" rx="10" fill="url(#cellC)"/>
  <rect x="130" y="270" width="56" height="56" rx="10" fill="url(#cellC)"/>
  <rect x="200" y="270" width="56" height="56" rx="10" fill="url(#cellC)"/>
  <rect x="270" y="270" width="56" height="56" rx="10" fill="url(#cellC)"/>

  <!-- Row 2 (3 cells) -->
  <rect x="60"  y="200" width="56" height="56" rx="10" fill="url(#cellC)"/>
  <rect x="130" y="200" width="56" height="56" rx="10" fill="url(#cellC)"/>
  <rect x="200" y="200" width="56" height="56" rx="10" fill="url(#cellC)"/>

  <!-- Row 1 (2 cells) -->
  <rect x="60"  y="130" width="56" height="56" rx="10" fill="url(#cellC)"/>
  <rect x="130" y="130" width="56" height="56" rx="10" fill="url(#cellC)"/>

  <!-- Row 0 (1 accent cell — electric blue) -->
  <rect x="60" y="60" width="56" height="56" rx="10" fill="#3B82F6"/>
</svg>
