<!-- Concept A — Geometric "B" Monogram
     Vibe: Stripe / Linear. A B formed from chunky rounded rectangles.
     Reads as B at every size, abstract at large sizes. Strong silhouette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F17"/>
      <stop offset="100%" stop-color="#06060A"/>
    </linearGradient>
    <linearGradient id="markA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4DCEA"/>
    </linearGradient>
    <radialGradient id="glowA" cx="68%" cy="22%" r="48%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgA)"/>
  <rect width="400" height="400" fill="url(#glowA)"/>

  <!-- Vertical spine of the B -->
  <rect x="92" y="88" width="50" height="224" rx="14" fill="url(#markA)"/>

  <!-- Upper bump (narrower) -->
  <rect x="142" y="88" width="120" height="98" rx="14" fill="url(#markA)"/>

  <!-- Lower bump (wider — ascending growth) -->
  <rect x="142" y="214" width="166" height="98" rx="14" fill="url(#markA)"/>

  <!-- Electric blue intelligence accent -->
  <circle cx="276" cy="118" r="10" fill="#3B82F6"/>
</svg>
