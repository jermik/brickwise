<!-- Concept B — Ascending Brick Stack (refined)
     Vibe: Linear / Vercel. Three ascending bars with deep gradient + glow.
     Keeps the existing Brickwise DNA but elevates the execution. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="barB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#A8C5FF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="glowB" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgB)"/>
  <rect width="400" height="400" fill="url(#glowB)"/>

  <!-- Three ascending bars — gradient runs across each so the
       bottom-right (the "growth" direction) glows electric blue -->
  <rect x="70" y="78"  width="120" height="76" rx="18" fill="url(#barB)"/>
  <rect x="70" y="162" width="210" height="76" rx="18" fill="url(#barB)"/>
  <rect x="70" y="246" width="260" height="76" rx="18" fill="url(#barB)"/>
</svg>
